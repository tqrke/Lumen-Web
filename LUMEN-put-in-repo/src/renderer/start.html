<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUMEN — New Tab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #0b0f19;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }
    .logo {
      margin-bottom: 32px;
      text-align: center;
    }
    .logo h1 {
      font-size: 42px;
      font-weight: 700;
      background: linear-gradient(135deg, #00D4FF, #6366F1, #8B5CF6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo p { color: #94a3b8; margin-top: 8px; font-size: 14px; }
    .search-box {
      width: 100%;
      max-width: 640px;
      display: flex;
      gap: 8px;
      margin-bottom: 48px;
    }
    .search-box input {
      flex: 1;
      padding: 14px 20px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: #151b28;
      color: #f1f5f9;
      font-size: 16px;
      outline: none;
    }
    .search-box input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
    .search-box button {
      padding: 14px 24px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    .quick-links {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      width: 100%;
      max-width: 720px;
    }
    .quick-link {
      padding: 16px;
      border-radius: 12px;
      background: #151b28;
      border: 1px solid rgba(255,255,255,0.06);
      color: #f1f5f9;
      text-decoration: none;
      text-align: center;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
    }
    .quick-link:hover { border-color: #6366f1; transform: translateY(-2px); }
    .badge {
      display: inline-block;
      margin-top: 24px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(16,185,129,0.15);
      color: #10b981;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <h1>LUMEN</h1>
    <p>Free · Private · No paid services</p>
  </div>

  <form class="search-box" id="search-form">
    <input id="search-input" type="text" placeholder="Search the web with DuckDuckGo..." autofocus />
    <button type="submit">Search</button>
  </form>

  <div class="quick-links">
    <a class="quick-link" data-url="https://duckduckgo.com">DuckDuckGo</a>
    <a class="quick-link" data-url="https://search.brave.com">Brave Search</a>
    <a class="quick-link" data-url="https://en.wikipedia.org">Wikipedia</a>
    <a class="quick-link" data-url="https://github.com">GitHub</a>
    <a class="quick-link" data-url="https://news.ycombinator.com">Hacker News</a>
    <a class="quick-link" data-url="https://developer.mozilla.org">MDN Docs</a>
  </div>

  <span class="badge">100% free — no Google APIs, no subscriptions</span>

  <script>
    document.getElementById('search-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const q = document.getElementById('search-input').value.trim();
      if (q && window.lumen) window.lumen.startSearch(q);
    });

    document.querySelectorAll('.quick-link').forEach((el) => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        const url = el.dataset.url;
        if (url && window.lumen) window.lumen.startNavigate(url);
      });
    });
  </script>
</body>
</html>
