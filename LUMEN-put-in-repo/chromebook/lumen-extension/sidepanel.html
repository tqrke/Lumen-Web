<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LUMEN Mind</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header>
    <div class="orb" id="orb" aria-hidden="true"></div>
    <div>
      <h1>LUMEN Mind</h1>
      <p class="sub">Chromebook · Tesco in Chrome</p>
    </div>
  </header>

  <button type="button" class="primary" id="listen">Tap to speak</button>
  <label class="toggle">
    <input type="checkbox" id="continuous" checked>
    <span>Keep listening after each command</span>
  </label>

  <div class="card">
    <div class="label">Heard</div>
    <div id="transcript" class="transcript">—</div>
  </div>
  <div class="card status-card">
    <div class="label">Status</div>
    <div id="status">Ready — tap to speak, then try “open Tesco”</div>
  </div>

  <div class="quick">
    <button type="button" class="chip" data-cmd="open tesco">Open Tesco</button>
    <button type="button" class="chip" data-cmd="search spaghetti">Search</button>
    <button type="button" class="chip" data-cmd="scroll">Scroll</button>
    <button type="button" class="chip" data-cmd="stop">Stop</button>
    <button type="button" class="chip" data-cmd="up">Up</button>
  </div>

  <footer>
    <p>Tesco runs in <strong>this Chrome tab</strong> — not a separate app.</p>
    <p class="dim">Mic required · Internet required</p>
  </footer>
  <script src="sidepanel.js"></script>
</body>
</html>
